services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: wallet_db
      POSTGRES_USER: wallet_user
      POSTGRES_PASSWORD: wallet_pass
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wallet_user -d wallet_db"]
      interval: 5s
      retries: 5

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      SECRET_KEY: local-dev-secret-not-for-production
      DEBUG: "True"
      DATABASE_URL: postgresql://wallet_user:wallet_pass@db:5432/wallet_db
    ports:
      - "8080:8080"
